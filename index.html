<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>아기 백색소음 믹서</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f3460">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="백색소음">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    color: #fff;
    padding: 20px;
  }
  .container { max-width: 1100px; margin: 0 auto; }
  header { text-align: center; padding: 20px 10px 30px; }
  h1 { font-size: 26px; font-weight: 600; margin-bottom: 6px; }
  .sub { opacity: 0.65; font-size: 14px; }
  .badge {
    display: inline-block;
    margin-top: 8px;
    background: rgba(135,206,250,0.15);
    color: #87cefa;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
  }

  .master-bar {
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 14px 18px;
    margin-bottom: 22px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .all-btn {
    padding: 8px 14px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
  }
  .all-btn:hover { background: rgba(255,255,255,0.2); }
  .stop-all { background: rgba(220,80,80,0.25); border-color: rgba(220,80,80,0.45); }
  .vol-section { flex: 1; min-width: 200px; display: flex; align-items: center; gap: 10px; }
  .vol-section label { font-size: 13px; opacity: 0.8; }
  .vol-section input { flex: 1; }
  .vol-val { opacity: 0.6; font-size: 12px; min-width: 28px; }
  .timer-section { display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .timer-section select {
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    padding: 5px 8px;
    font-size: 13px;
  }

  .category { margin-bottom: 22px; }
  .cat-title {
    font-size: 13px;
    font-weight: 600;
    opacity: 0.7;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
    padding-left: 4px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }
  .card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 14px;
    transition: all 0.2s;
    cursor: pointer;
    position: relative;
  }
  .card:hover { background: rgba(255,255,255,0.1); }
  .card.active {
    background: rgba(135,206,250,0.2);
    border-color: rgba(135,206,250,0.6);
    box-shadow: 0 0 20px rgba(135,206,250,0.15);
  }
  .card-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }
  .icon { font-size: 22px; width: 32px; text-align: center; }
  .name { font-size: 14px; font-weight: 500; flex: 1; }
  .led {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    transition: all 0.2s;
  }
  .card.active .led {
    background: #87cefa;
    box-shadow: 0 0 10px #87cefa;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .meta {
    font-size: 11px;
    opacity: 0.55;
    margin-bottom: 10px;
    padding-left: 42px;
  }
  .vol-row {
    display: flex; align-items: center; gap: 8px;
  }
  .vol-row input[type=range] {
    flex: 1;
    accent-color: #87cefa;
    height: 4px;
  }
  .vol-row .val {
    font-size: 11px;
    opacity: 0.6;
    min-width: 28px;
    text-align: right;
  }

  .preset-bar {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 12px 16px;
    margin-top: 22px;
  }
  .preset-title { font-size: 12px; opacity: 0.6; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
  .preset-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 4px;
  }
  .save-preset-btn {
    background: rgba(135,206,250,0.22);
    border: 1px solid rgba(135,206,250,0.45);
    color: #fff;
    border-radius: 8px;
    padding: 6px 11px;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
  }
  .save-preset-btn:hover { background: rgba(135,206,250,0.4); }
  .preset-buttons { display: flex; flex-wrap: wrap; gap: 8px; }
  .preset {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 12px;
    cursor: pointer;
  }
  .preset:hover { background: rgba(135,206,250,0.25); border-color: rgba(135,206,250,0.5); }
  .user-preset-wrap {
    position: relative;
    display: inline-block;
  }
  .user-preset {
    background: rgba(255,215,120,0.12);
    border-color: rgba(255,215,120,0.35);
  }
  .user-preset:hover {
    background: rgba(255,215,120,0.28);
    border-color: rgba(255,215,120,0.6);
  }
  .user-preset-delete {
    position: absolute;
    top: -7px;
    right: -7px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: rgba(220,80,80,0.85);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.3);
    font-size: 13px;
    line-height: 1;
    cursor: pointer;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .user-preset-delete:hover { background: rgba(240,80,80,1); }

  /* Custom (user-uploaded/recorded) sounds */
  .custom-sounds-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .custom-add-btn {
    background: rgba(135,206,250,0.18);
    border: 1px dashed rgba(135,206,250,0.5);
    color: #fff;
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
  }
  .custom-add-btn:hover { background: rgba(135,206,250,0.32); }
  .custom-card { border-color: rgba(255,215,120,0.4); }
  .custom-card.active {
    background: rgba(255,215,120,0.22);
    border-color: rgba(255,215,120,0.7);
    box-shadow: 0 0 20px rgba(255,215,120,0.18);
  }
  .custom-card.active .led {
    background: #ffd778;
    box-shadow: 0 0 10px #ffd778;
  }
  .custom-controls {
    display: none;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed rgba(255,255,255,0.12);
    font-size: 12px;
  }
  .custom-card.expanded .custom-controls { display: block; }
  .custom-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 6px;
    flex-wrap: wrap;
  }
  .custom-row label { opacity: 0.8; }
  .custom-row select, .custom-row input[type="number"] {
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    padding: 4px 6px;
    font-size: 12px;
  }
  .custom-row input[type="number"] { width: 70px; }
  .custom-actions {
    display: flex;
    gap: 6px;
    margin-top: 8px;
  }
  .custom-action-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
  }
  .custom-action-btn.danger {
    background: rgba(220,80,80,0.2);
    border-color: rgba(220,80,80,0.45);
  }
  .gear-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    border: none;
    color: #fff;
    font-size: 11px;
    cursor: pointer;
    padding: 0;
    line-height: 1;
  }
  .gear-btn:hover { background: rgba(255,255,255,0.22); }

  /* Recording modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(6px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: #16213e;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    padding: 24px;
    max-width: 400px;
    width: 100%;
    color: #fff;
  }
  .modal h2 { font-size: 18px; margin-bottom: 12px; }
  .modal p { font-size: 13px; opacity: 0.75; margin-bottom: 16px; }
  .rec-display {
    text-align: center;
    font-size: 32px;
    font-variant-numeric: tabular-nums;
    margin: 16px 0;
    font-weight: 300;
    letter-spacing: 0.1em;
  }
  .rec-dot {
    display: inline-block;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #ff5050;
    margin-right: 8px;
    animation: pulse 1s infinite;
    vertical-align: middle;
  }
  .modal-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .modal-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
  }
  .modal-btn.primary {
    background: rgba(135,206,250,0.3);
    border-color: rgba(135,206,250,0.6);
  }
  .modal-btn.danger {
    background: rgba(220,80,80,0.3);
    border-color: rgba(220,80,80,0.6);
  }
  .modal-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .status-bar {
    text-align: center;
    margin-top: 18px;
    font-size: 12px;
    opacity: 0.6;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🌙 아기 백색소음 믹서</h1>
    <div class="sub">18개 음원 · 여러 소리 동시 재생 · 인터넷 불필요</div>
    <div class="badge">✓ 오프라인 작동 · ✓ Public Domain · ✓ 무한 반복</div>
  </header>

  <div class="master-bar">
    <button class="all-btn stop-all" id="stopAll">⏹ 전체 정지</button>
    <div class="vol-section">
      <label>마스터</label>
      <input type="range" id="masterVol" min="0" max="100" value="70">
      <span class="vol-val" id="masterVolVal">70</span>
    </div>
    <div class="timer-section">
      <span>⏱</span>
      <select id="timer">
        <option value="0">계속 재생</option>
        <option value="15">15분</option>
        <option value="30">30분</option>
        <option value="60">1시간</option>
        <option value="120">2시간</option>
        <option value="240">4시간</option>
      </select>
    </div>
    <button class="all-btn" id="refreshBtn" title="최신 버전으로 새로고침">🔄</button>
  </div>
  <div id="updateBanner" style="display:none;background:rgba(135,206,250,0.18);border:1px solid rgba(135,206,250,0.5);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:13px;align-items:center;gap:10px;">
    <span style="flex:1">✨ 새 버전이 준비됐어요. 탭하면 적용됩니다.</span>
    <button class="all-btn" id="applyUpdate" style="padding:5px 10px;font-size:12px;">업데이트</button>
  </div>

  <div class="category" id="customCategory">
    <div class="cat-title">👤 내 음원 (업로드 / 녹음)</div>
    <div class="custom-sounds-bar">
      <button class="custom-add-btn" id="addFileBtn">📁 파일 추가</button>
      <button class="custom-add-btn" id="recordBtn">🎤 녹음하기</button>
      <input type="file" id="fileInput" accept="audio/*" style="display:none;">
    </div>
    <div class="grid" id="customGrid"></div>
  </div>

  <div id="categories"></div>

  <div class="modal-backdrop" id="recModal">
    <div class="modal">
      <h2>🎤 음성 녹음</h2>
      <p id="recHint">녹음 시작을 누르면 마이크 권한을 요청합니다. iOS는 녹음 중 다른 소리가 일시정지될 수 있어요.</p>
      <div class="rec-display" id="recTime">00:00</div>
      <audio id="recPreview" controls style="width:100%;display:none;margin-bottom:12px;"></audio>
      <div class="modal-actions">
        <button class="modal-btn" id="recCancel">취소</button>
        <button class="modal-btn danger" id="recStop" style="display:none;">⏹ 정지</button>
        <button class="modal-btn primary" id="recStart">⏺ 녹음 시작</button>
        <button class="modal-btn" id="recRetry" style="display:none;">↻ 다시</button>
        <button class="modal-btn primary" id="recSave" style="display:none;">💾 저장</button>
      </div>
    </div>
  </div>

  <div class="preset-bar">
    <div class="preset-header">
      <div class="preset-title">⚡ 프리셋 (자주 쓰는 조합)</div>
      <button class="save-preset-btn" id="savePresetBtn">💾 현재 믹스 저장</button>
    </div>
    <div class="preset-buttons" id="presets"></div>
    <div class="user-preset-section" id="userPresetSection" style="display:none;">
      <div class="preset-title" style="margin-top:14px;">⭐ 내 프리셋</div>
      <div class="preset-buttons" id="userPresets"></div>
    </div>
  </div>

  <div class="status-bar" id="status">소리 카드를 클릭하면 켜집니다 · 여러 개 동시 켜기 가능</div>
</div>

<script>
  const SOUNDS = [
    // 백색소음 (스튜디오 24-bit 녹음)
    { id: 'white_noise',    name: '화이트 노이즈',  icon: '⚪', cat: 'noise',
      file: 'white_noise.mp3', meta: '10분 · 24-bit 스튜디오' },
    { id: 'pink_noise',     name: '핑크 노이즈',    icon: '🌸', cat: 'noise',
      file: 'pink_noise.mp3', meta: '10분 · 부드러운 노이즈' },
    { id: 'brown_noise',    name: '브라운 노이즈',  icon: '🟫', cat: 'noise',
      file: 'brown_noise.mp3', meta: '10분 · ⭐⭐⭐⭐⭐ 인기' },

    // 빗소리 (강도별)
    { id: 'soft_rain',      name: '잔잔한 보슬비',  icon: '☔', cat: 'rain',
      file: 'soft_rain.mp3', meta: '9분 · 가장 부드러움' },
    { id: 'light_rain',     name: '약한 비',        icon: '🌦️', cat: 'rain',
      file: 'light_rain.mp3', meta: '15분 · 잔잔히 내리는 비' },
    { id: 'rain_window',    name: '창문 빗방울',    icon: '🪟', cat: 'rain',
      file: 'rain_window.mp3', meta: '창문에 떨어지는 빗소리' },
    { id: 'rain',           name: '폭우',           icon: '🌧️', cat: 'rain',
      file: 'rain.mp3', meta: '15분 · 강한 빗줄기' },
    { id: 'thunderstorm',   name: '번개 뇌우',      icon: '⛈️', cat: 'rain',
      file: 'thunderstorm.mp3', meta: '16분 · 비 + 천둥' },

    // 자연 소리 (실제 현장 녹음)
    { id: 'ocean',          name: '파도 소리',      icon: '🌊', cat: 'nature',
      file: 'ocean.mp3', meta: '15분 · La Jolla 해변' },
    { id: 'fireplace',      name: '모닥불',         icon: '🔥', cat: 'nature',
      file: 'fireplace.mp3', meta: '15분 · 진짜 벽난로' },
    { id: 'birds_seoul',    name: '한강 새소리',    icon: '🐦', cat: 'nature',
      file: 'birds_seoul.mp3', meta: '4분 · 반포한강공원' },
    { id: 'forest',         name: '숲 소리',        icon: '🌲', cat: 'nature',
      file: 'forest.mp3', meta: '체코 숲 실제 녹음' },

    // 쉬쉬 (엄마/아빠가 내는 진정 소리)
    { id: 'shushing_real',    name: '쉬이이이~',     icon: '🤫', cat: 'shush',
      file: 'shushing_real.mp3', meta: '56초 · 실제 녹음 (Pixabay)' },

    // 분위기
    { id: 'wind_chimes',    name: '풍경/귀뚜라미',  icon: '🎐', cat: 'ambient',
      file: 'wind_chimes.mp3', meta: '3분 · 풍경+귀뚜라미+종' },

    // 자장가 음악 (오르골 / 자장가)
    { id: 'lullaby',        name: '아기 자장가',    icon: '🍼', cat: 'music',
      file: 'lullaby.mp3', meta: '3분 · 부드러운 자장가' },
    { id: 'musicbox_brahms',name: '브람스 왈츠',    icon: '🎵', cat: 'music',
      file: 'musicbox_brahms.mp3', meta: '오르골 · 브람스' },
    { id: 'musicbox_bach',  name: 'Bach G선상의 아리아', icon: '🎼', cat: 'music',
      file: 'musicbox_bach.mp3', meta: '오르골 · 바흐' },
    { id: 'musicbox_chopin',name: '쇼팽 야상곡',    icon: '🎶', cat: 'music',
      file: 'musicbox_chopin.mp3', meta: '오르골 · 쇼팽' },
  ];

  const CATEGORIES = [
    { key: 'noise',   label: '🔊 백색소음 (24-bit 스튜디오 녹음)' },
    { key: 'rain',    label: '🌧️ 빗소리 (강도별)' },
    { key: 'nature',  label: '🌿 자연 소리 (실제 현장 녹음)' },
    { key: 'shush',   label: '🤫 쉬쉬 소리 (Karp 진정법)' },
    { key: 'ambient', label: '🎐 분위기' },
    { key: 'music',   label: '🎼 자장가 / 오르골' },
  ];

  const PRESETS = [
    { name: '🌙 신생아 잠재우기', mix: { shushing_real: 60, brown_noise: 35, lullaby: 25 } },
    { name: '🤫 쉬이이이 + 빗소리', mix: { shushing_real: 65, soft_rain: 40 } },
    { name: '☔ 보슬비 자장가',    mix: { soft_rain: 70, lullaby: 35 } },
    { name: '🌦️ 비 오는 오후',     mix: { light_rain: 65, fireplace: 30 } },
    { name: '🪟 창가의 빗소리',    mix: { rain_window: 80, brown_noise: 25 } },
    { name: '⛈️ 뇌우 ASMR',         mix: { thunderstorm: 75, brown_noise: 20 } },
    { name: '🏖️ 바닷가 휴식',       mix: { ocean: 75, pink_noise: 20 } },
    { name: '🔥 캠프파이어',        mix: { fireplace: 70, wind_chimes: 30, brown_noise: 25 } },
    { name: '🌅 숲속 아침',          mix: { forest: 60, birds_seoul: 50 } },
    { name: '💤 깊은 잠',          mix: { brown_noise: 60, soft_rain: 30 } },
    { name: '🎵 브람스 + 빗소리',    mix: { musicbox_brahms: 55, soft_rain: 30 } },
    { name: '🎼 바흐 + 빗소리',      mix: { musicbox_bach: 55, light_rain: 30 } },
    { name: '🌊 해변 자장가',        mix: { ocean: 55, lullaby: 40 } },
  ];

  const tracks = {};
  let masterVolume = 0.7;
  let timerHandle = null;
  let audioCtx = null;
  let mixDest = null;
  let outputEl = null;

  const USER_PRESETS_KEY = 'baby_sleep_user_presets';
  const USER_PRESETS_LIMIT = 50;

  function loadUserPresets() {
    try {
      const raw = localStorage.getItem(USER_PRESETS_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch { return []; }
  }

  function saveUserPresets(arr) {
    try {
      localStorage.setItem(USER_PRESETS_KEY, JSON.stringify(arr));
    } catch (e) {
      document.getElementById('status').textContent = '저장 실패: ' + e.message;
    }
  }

  function captureCurrentMix() {
    const mix = {};
    Object.entries(tracks).forEach(([id, t]) => {
      if (t.active) mix[id] = Math.round(t.vol * 100);
    });
    return mix;
  }

  // -------- IndexedDB for custom sounds --------
  const DB_NAME = 'BabySleepDB';
  const DB_VERSION = 1;
  const STORE_CUSTOM = 'customSounds';
  let dbPromise = null;

  function openDb() {
    if (dbPromise) return dbPromise;
    dbPromise = new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(STORE_CUSTOM)) {
          db.createObjectStore(STORE_CUSTOM, { keyPath: 'id' });
        }
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
    return dbPromise;
  }

  async function dbPut(sound) {
    const db = await openDb();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_CUSTOM, 'readwrite');
      tx.objectStore(STORE_CUSTOM).put(sound);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }

  async function dbGetAll() {
    const db = await openDb();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_CUSTOM, 'readonly');
      const req = tx.objectStore(STORE_CUSTOM).getAll();
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  async function dbDelete(id) {
    const db = await openDb();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_CUSTOM, 'readwrite');
      tx.objectStore(STORE_CUSTOM).delete(id);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }

  // Maps custom sound id -> { sound: stored object, objectUrl: string }
  const customRegistry = {};

  // iOS background-audio strategy:
  // 1. Each track <audio> -> MediaElementSource -> Gain -> mixDest (a
  //    MediaStreamAudioDestinationNode), NOT directly to ctx.destination.
  // 2. A single "output" <audio> element plays the mix via srcObject.
  // 3. iOS keeps the page's audio session alive because outputEl is producing
  //    real (mixed) audio output, so AudioContext doesn't suspend on lock /
  //    background and the mix keeps playing.
  function initAudio() {
    if (audioCtx) return;
    const Ctx = window.AudioContext || window.webkitAudioContext;
    audioCtx = new Ctx();
    mixDest = audioCtx.createMediaStreamDestination();
    outputEl = new Audio();
    outputEl.srcObject = mixDest.stream;
    outputEl.preload = 'auto';
  }

  function startOutput() {
    if (outputEl && outputEl.paused) {
      outputEl.play().catch(e => {
        document.getElementById('status').textContent = '출력 시작 실패: ' + e.message;
      });
    }
  }

  function anyActive() {
    return Object.values(tracks).some(t => t.active);
  }

  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && audioCtx && audioCtx.state === 'suspended' && anyActive()) {
      audioCtx.resume().catch(() => {});
      startOutput();
    }
  });

  function ensureRouting(id) {
    const t = tracks[id];
    if (t.source) return;
    initAudio();
    t.source = audioCtx.createMediaElementSource(t.audio);
    t.gainNode = audioCtx.createGain();
    t.gainNode.gain.value = 0;
    t.source.connect(t.gainNode);
    t.gainNode.connect(mixDest);
    t.audio.volume = 1;
  }

  const catContainer = document.getElementById('categories');
  CATEGORIES.forEach(cat => {
    const section = document.createElement('div');
    section.className = 'category';
    section.innerHTML = `<div class="cat-title">${cat.label}</div><div class="grid"></div>`;
    const grid = section.querySelector('.grid');
    SOUNDS.filter(s => s.cat === cat.key).forEach(s => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.id = s.id;
      card.innerHTML = `
        <div class="card-head">
          <div class="icon">${s.icon}</div>
          <div class="name">${s.name}</div>
          <div class="led"></div>
        </div>
        <div class="meta">${s.meta}</div>
        <div class="vol-row">
          <span style="font-size:11px;opacity:0.5">🔉</span>
          <input type="range" min="0" max="100" value="50" data-vol="${s.id}">
          <span class="val" data-val="${s.id}">50</span>
        </div>
      `;
      grid.appendChild(card);

      const audio = new Audio();
      audio.loop = true;
      audio.preload = 'metadata';
      audio.crossOrigin = 'anonymous';
      audio.src = s.file;
      tracks[s.id] = { audio, source: null, gainNode: null, vol: 0.5, active: false };

      card.addEventListener('click', e => {
        if (e.target.tagName === 'INPUT') return;
        toggleTrack(s.id);
      });

      const slider = card.querySelector(`input[data-vol="${s.id}"]`);
      slider.addEventListener('click', e => e.stopPropagation());
      slider.addEventListener('pointerdown', e => e.stopPropagation());
      slider.addEventListener('input', () => {
        tracks[s.id].vol = slider.value / 100;
        card.querySelector(`[data-val="${s.id}"]`).textContent = slider.value;
        updateVolume(s.id);
      });
    });
    catContainer.appendChild(section);
  });

  function startInterval(id) {
    const t = tracks[id];
    const reg = customRegistry[id];
    if (!reg) return;
    const ms = Math.max(1, reg.sound.intervalSec || 30) * 1000;
    if (t.intervalHandle) clearInterval(t.intervalHandle);
    t.intervalHandle = setInterval(() => {
      try {
        t.audio.currentTime = 0;
        t.audio.play().catch(() => {});
      } catch {}
    }, ms);
  }

  function stopInterval(id) {
    const t = tracks[id];
    if (t.intervalHandle) {
      clearInterval(t.intervalHandle);
      t.intervalHandle = null;
    }
  }

  function isIntervalMode(id) {
    const t = tracks[id];
    if (!t || !t.isCustom) return false;
    const reg = customRegistry[id];
    return !!(reg && reg.sound.loopMode === 'interval');
  }

  async function toggleTrack(id) {
    const t = tracks[id];
    const card = document.querySelector(`.card[data-id="${id}"]`);
    if (t.active) {
      t.audio.pause();
      stopInterval(id);
      t.active = false;
      card.classList.remove('active');
      updateVolume(id);
    } else {
      // Synchronously start output element within user gesture (iOS).
      initAudio();
      startOutput();
      // Apply current loop setting (interval mode plays one-shot, then re-fires).
      if (t.isCustom) {
        t.audio.loop = !isIntervalMode(id);
      }
      ensureRouting(id);
      if (audioCtx.state === 'suspended') {
        try { await audioCtx.resume(); } catch {}
      }
      try {
        await t.audio.play();
        t.active = true;
        card.classList.add('active');
        updateVolume(id);
        if (isIntervalMode(id)) startInterval(id);
      } catch (e) {
        document.getElementById('status').textContent = '재생 실패: ' + e.message;
      }
    }
    updateStatus();
    updateMediaSession();
  }

  function updateVolume(id) {
    const t = tracks[id];
    const target = t.active ? t.vol * masterVolume : 0;
    if (t.gainNode && audioCtx) {
      const now = audioCtx.currentTime;
      t.gainNode.gain.cancelScheduledValues(now);
      t.gainNode.gain.setValueAtTime(t.gainNode.gain.value, now);
      t.gainNode.gain.linearRampToValueAtTime(target, now + 0.05);
    } else {
      t.audio.volume = target;
    }
  }

  function updateMediaSession() {
    if (!('mediaSession' in navigator)) return;
    const playing = Object.entries(tracks).filter(([, t]) => t.active);
    if (playing.length === 0) {
      navigator.mediaSession.playbackState = 'paused';
      return;
    }
    const names = playing.map(([id]) => SOUNDS.find(s => s.id === id)?.name).filter(Boolean);
    navigator.mediaSession.metadata = new MediaMetadata({
      title: names.length === 1 ? names[0] : `${playing.length}개 소리 믹스`,
      artist: '🌙 아기 백색소음 믹서',
      album: names.join(' + '),
    });
    navigator.mediaSession.playbackState = 'playing';
  }

  if ('mediaSession' in navigator) {
    navigator.mediaSession.setActionHandler('pause', () => {
      Object.entries(tracks).forEach(([id, t]) => {
        if (t.active) {
          t.audio.pause();
          stopInterval(id);
          t.active = false;
          document.querySelector(`.card[data-id="${id}"]`).classList.remove('active');
          updateVolume(id);
        }
      });
      updateStatus();
      updateMediaSession();
    });
    navigator.mediaSession.setActionHandler('play', () => {
      Object.entries(tracks).forEach(([id, t]) => {
        if (t.audio.paused && t.gainNode) {
          if (t.isCustom) t.audio.loop = !isIntervalMode(id);
          t.audio.play().catch(()=>{});
          t.active = true;
          document.querySelector(`.card[data-id="${id}"]`).classList.add('active');
          updateVolume(id);
          if (isIntervalMode(id)) startInterval(id);
        }
      });
      startOutput();
      updateStatus();
      updateMediaSession();
    });
  }

  function updateStatus() {
    const playing = Object.entries(tracks).filter(([, t]) => t.active).length;
    const status = document.getElementById('status');
    if (playing === 0) status.textContent = '재생 중인 소리 없음';
    else status.textContent = `🎧 ${playing}개 소리 동시 재생 중 · 무한 반복`;
  }

  document.getElementById('masterVol').addEventListener('input', e => {
    masterVolume = e.target.value / 100;
    document.getElementById('masterVolVal').textContent = e.target.value;
    Object.keys(tracks).forEach(updateVolume);
  });

  document.getElementById('stopAll').addEventListener('click', () => {
    Object.entries(tracks).forEach(([id, t]) => {
      if (t.active) {
        t.audio.pause();
        stopInterval(id);
        t.active = false;
        document.querySelector(`.card[data-id="${id}"]`).classList.remove('active');
        updateVolume(id);
      }
    });
    updateStatus();
    updateMediaSession();
  });

  document.getElementById('timer').addEventListener('change', e => {
    if (timerHandle) { clearTimeout(timerHandle); timerHandle = null; }
    const min = parseInt(e.target.value, 10);
    if (min > 0) {
      timerHandle = setTimeout(() => {
        const startMaster = masterVolume;
        let step = 0;
        const totalSteps = 60;
        const fade = setInterval(() => {
          step++;
          masterVolume = startMaster * (1 - step / totalSteps);
          Object.keys(tracks).forEach(updateVolume);
          if (step >= totalSteps) {
            clearInterval(fade);
            Object.entries(tracks).forEach(([id, t]) => {
              if (t.active) {
                t.audio.pause();
                stopInterval(id);
                t.active = false;
                document.querySelector(`.card[data-id="${id}"]`).classList.remove('active');
                updateVolume(id);
              }
            });
            masterVolume = startMaster;
            document.getElementById('masterVol').value = startMaster * 100;
            document.getElementById('masterVolVal').textContent = Math.round(startMaster * 100);
            document.getElementById('status').textContent = '⏱ 타이머 종료';
            updateMediaSession();
          }
        }, 250);
      }, min * 60 * 1000);
      document.getElementById('status').textContent = `⏱ ${min}분 후 자동 종료 예약됨`;
    }
  });

  const presetContainer = document.getElementById('presets');
  PRESETS.forEach(preset => {
    const btn = document.createElement('button');
    btn.className = 'preset';
    btn.textContent = preset.name;
    btn.addEventListener('click', () => applyPreset(preset));
    presetContainer.appendChild(btn);
  });

  const userPresetSection = document.getElementById('userPresetSection');
  const userPresetContainer = document.getElementById('userPresets');

  function renderUserPresets() {
    const list = loadUserPresets();
    userPresetContainer.innerHTML = '';
    if (list.length === 0) {
      userPresetSection.style.display = 'none';
      return;
    }
    userPresetSection.style.display = 'block';
    list.forEach((preset, idx) => {
      const wrap = document.createElement('div');
      wrap.className = 'user-preset-wrap';

      const btn = document.createElement('button');
      btn.className = 'preset user-preset';
      btn.textContent = preset.name;
      btn.addEventListener('click', () => applyPreset(preset));

      const del = document.createElement('button');
      del.className = 'user-preset-delete';
      del.textContent = '×';
      del.title = '삭제';
      del.addEventListener('click', (e) => {
        e.stopPropagation();
        if (confirm(`"${preset.name}" 프리셋을 삭제할까요?`)) {
          const cur = loadUserPresets();
          cur.splice(idx, 1);
          saveUserPresets(cur);
          renderUserPresets();
        }
      });

      wrap.appendChild(btn);
      wrap.appendChild(del);
      userPresetContainer.appendChild(wrap);
    });
  }

  document.getElementById('savePresetBtn').addEventListener('click', () => {
    const mix = captureCurrentMix();
    if (Object.keys(mix).length === 0) {
      document.getElementById('status').textContent = '저장할 소리가 없습니다 — 카드를 먼저 탭하세요';
      return;
    }
    const name = (prompt('프리셋 이름을 입력하세요:', '') || '').trim();
    if (!name) return;
    const list = loadUserPresets();
    if (list.length >= USER_PRESETS_LIMIT) {
      document.getElementById('status').textContent = `프리셋이 너무 많습니다 (최대 ${USER_PRESETS_LIMIT}개)`;
      return;
    }
    list.push({ name, mix });
    saveUserPresets(list);
    renderUserPresets();
    document.getElementById('status').textContent = `✓ "${name}" 저장됨`;
  });

  renderUserPresets();

  async function applyPreset(preset) {
    initAudio();
    startOutput();
    if (audioCtx.state === 'suspended') {
      try { await audioCtx.resume(); } catch {}
    }
    Object.entries(tracks).forEach(([id, t]) => {
      if (t.active) {
        t.audio.pause();
        stopInterval(id);
        t.active = false;
        document.querySelector(`.card[data-id="${id}"]`).classList.remove('active');
        updateVolume(id);
      }
    });
    setTimeout(() => {
      Object.entries(preset.mix).forEach(([id, vol]) => {
        if (!tracks[id]) return;
        tracks[id].vol = vol / 100;
        const slider = document.querySelector(`input[data-vol="${id}"]`);
        if (slider) slider.value = vol;
        const valEl = document.querySelector(`[data-val="${id}"]`);
        if (valEl) valEl.textContent = vol;
        const card = document.querySelector(`.card[data-id="${id}"]`);
        ensureRouting(id);
        if (tracks[id].isCustom) tracks[id].audio.loop = !isIntervalMode(id);
        tracks[id].audio.play().catch(()=>{});
        tracks[id].active = true;
        if (card) card.classList.add('active');
        updateVolume(id);
        if (isIntervalMode(id)) startInterval(id);
      });
      updateStatus();
      updateMediaSession();
    }, 80);
  }

  // -------- Service Worker / PWA update flow --------
  const refreshBtn = document.getElementById('refreshBtn');
  const updateBanner = document.getElementById('updateBanner');
  const applyUpdateBtn = document.getElementById('applyUpdate');
  let waitingWorker = null;

  refreshBtn.addEventListener('click', async () => {
    refreshBtn.disabled = true;
    refreshBtn.textContent = '⏳';
    try {
      if ('serviceWorker' in navigator) {
        const reg = await navigator.serviceWorker.getRegistration();
        if (reg) await reg.update();
      }
    } catch {}
    location.reload();
  });

  function showUpdateBanner(worker) {
    waitingWorker = worker;
    updateBanner.style.display = 'flex';
  }

  applyUpdateBtn.addEventListener('click', () => {
    if (waitingWorker) {
      waitingWorker.postMessage('SKIP_WAITING');
    }
  });

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').then((reg) => {
        if (reg.waiting) showUpdateBanner(reg.waiting);
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          if (!nw) return;
          nw.addEventListener('statechange', () => {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              showUpdateBanner(nw);
            }
          });
        });
        // Periodically check for updates while page is open.
        setInterval(() => reg.update().catch(() => {}), 60 * 60 * 1000);
      }).catch(() => {});

      let reloading = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (reloading) return;
        reloading = true;
        location.reload();
      });
    });
  }

  // -------- Custom sounds (upload / record) --------
  const customGrid = document.getElementById('customGrid');

  function makeCustomCard(sound) {
    const card = document.createElement('div');
    card.className = 'card custom-card';
    card.dataset.id = sound.id;
    card.innerHTML = `
      <button class="gear-btn" type="button" title="설정">⚙</button>
      <div class="card-head">
        <div class="icon">${sound.icon || '🎵'}</div>
        <div class="name"></div>
        <div class="led"></div>
      </div>
      <div class="meta">${sound.loopMode === 'interval' ? `${sound.intervalSec}초마다 반복` : '연속 재생'}</div>
      <div class="vol-row">
        <span style="font-size:11px;opacity:0.5">🔉</span>
        <input type="range" min="0" max="100" value="50" data-vol="${sound.id}">
        <span class="val" data-val="${sound.id}">50</span>
      </div>
      <div class="custom-controls">
        <div class="custom-row">
          <label>이름</label>
          <input type="text" class="custom-name-input" value="" style="flex:1;background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.2);border-radius:6px;padding:4px 8px;font-size:12px;">
        </div>
        <div class="custom-row">
          <label>재생 방식</label>
          <select class="custom-loop-select">
            <option value="continuous">연속 재생 (loop)</option>
            <option value="interval">N초마다 반복</option>
          </select>
        </div>
        <div class="custom-row custom-interval-row" style="display:none;">
          <label>간격</label>
          <input type="number" class="custom-interval-input" min="1" max="3600" step="1">
          <span style="opacity:0.6;">초</span>
        </div>
        <div class="custom-actions">
          <button class="custom-action-btn custom-save-btn" type="button">저장</button>
          <button class="custom-action-btn danger custom-delete-btn" type="button">삭제</button>
        </div>
      </div>
    `;
    card.querySelector('.name').textContent = sound.name;

    const nameInput = card.querySelector('.custom-name-input');
    const loopSelect = card.querySelector('.custom-loop-select');
    const intervalRow = card.querySelector('.custom-interval-row');
    const intervalInput = card.querySelector('.custom-interval-input');

    nameInput.value = sound.name;
    loopSelect.value = sound.loopMode || 'continuous';
    intervalInput.value = sound.intervalSec || 30;
    intervalRow.style.display = loopSelect.value === 'interval' ? 'flex' : 'none';

    loopSelect.addEventListener('change', () => {
      intervalRow.style.display = loopSelect.value === 'interval' ? 'flex' : 'none';
    });

    // Stop propagation on inner controls so card click doesn't toggle
    ['click', 'pointerdown'].forEach(ev => {
      card.querySelectorAll('input, select, button.custom-action-btn, button.custom-save-btn, button.custom-delete-btn, button.gear-btn')
        .forEach(el => el.addEventListener(ev, e => e.stopPropagation()));
    });

    card.querySelector('.gear-btn').addEventListener('click', () => {
      card.classList.toggle('expanded');
    });

    card.querySelector('.custom-save-btn').addEventListener('click', async () => {
      const reg = customRegistry[sound.id];
      if (!reg) return;
      const newName = nameInput.value.trim() || sound.name;
      const newLoop = loopSelect.value;
      const newInterval = Math.max(1, Math.min(3600, parseInt(intervalInput.value, 10) || 30));
      reg.sound.name = newName;
      reg.sound.loopMode = newLoop;
      reg.sound.intervalSec = newInterval;
      try {
        await dbPut(reg.sound);
        card.querySelector('.name').textContent = newName;
        card.querySelector('.meta').textContent = newLoop === 'interval' ? `${newInterval}초마다 반복` : '연속 재생';
        // If currently playing, restart with new mode
        if (tracks[sound.id].active) {
          stopInterval(sound.id);
          tracks[sound.id].audio.loop = newLoop !== 'interval';
          if (newLoop === 'interval') startInterval(sound.id);
        }
        document.getElementById('status').textContent = '✓ 설정 저장됨';
        card.classList.remove('expanded');
      } catch (e) {
        document.getElementById('status').textContent = '저장 실패: ' + e.message;
      }
    });

    card.querySelector('.custom-delete-btn').addEventListener('click', async () => {
      if (!confirm(`"${sound.name}" 음원을 삭제할까요?`)) return;
      await deleteCustomSound(sound.id);
    });

    // Card click toggles play
    card.addEventListener('click', e => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'BUTTON') return;
      toggleTrack(sound.id);
    });

    const slider = card.querySelector(`input[type="range"][data-vol="${sound.id}"]`);
    slider.addEventListener('input', () => {
      tracks[sound.id].vol = slider.value / 100;
      card.querySelector(`[data-val="${sound.id}"]`).textContent = slider.value;
      updateVolume(sound.id);
    });

    return card;
  }

  function registerCustomSound(sound) {
    const objectUrl = URL.createObjectURL(sound.blob);
    customRegistry[sound.id] = { sound, objectUrl };

    const audio = new Audio();
    audio.preload = 'metadata';
    audio.src = objectUrl;
    audio.crossOrigin = 'anonymous';
    audio.loop = sound.loopMode !== 'interval';

    tracks[sound.id] = {
      audio,
      source: null,
      gainNode: null,
      vol: 0.5,
      active: false,
      isCustom: true,
      intervalHandle: null,
    };

    const card = makeCustomCard(sound);
    customGrid.appendChild(card);
  }

  async function deleteCustomSound(id) {
    const t = tracks[id];
    const reg = customRegistry[id];
    if (t && t.active) {
      t.audio.pause();
      stopInterval(id);
      t.active = false;
    }
    if (reg) URL.revokeObjectURL(reg.objectUrl);
    if (t && t.source) try { t.source.disconnect(); } catch {}
    if (t && t.gainNode) try { t.gainNode.disconnect(); } catch {}
    delete tracks[id];
    delete customRegistry[id];
    const card = document.querySelector(`.custom-card[data-id="${id}"]`);
    if (card) card.remove();
    try { await dbDelete(id); } catch {}
    updateStatus();
    updateMediaSession();
  }

  async function loadCustomSounds() {
    try {
      const list = await dbGetAll();
      list.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
      list.forEach(registerCustomSound);
    } catch (e) {
      document.getElementById('status').textContent = '내 음원 로드 실패: ' + e.message;
    }
  }

  // ---- File upload ----
  document.getElementById('addFileBtn').addEventListener('click', () => {
    document.getElementById('fileInput').click();
  });

  document.getElementById('fileInput').addEventListener('change', async (e) => {
    const file = e.target.files && e.target.files[0];
    e.target.value = '';
    if (!file) return;
    if (!file.type.startsWith('audio/')) {
      document.getElementById('status').textContent = '오디오 파일만 추가 가능합니다';
      return;
    }
    const defaultName = file.name.replace(/\.[^.]+$/, '');
    const name = (prompt('음원 이름:', defaultName) || '').trim();
    if (!name) return;
    const sound = {
      id: 'custom_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
      name,
      icon: '🎵',
      blob: file,
      mimeType: file.type,
      loopMode: 'continuous',
      intervalSec: 30,
      createdAt: Date.now(),
    };
    try {
      await dbPut(sound);
      registerCustomSound(sound);
      document.getElementById('status').textContent = `✓ "${name}" 추가됨`;
    } catch (err) {
      document.getElementById('status').textContent = '저장 실패: ' + err.message;
    }
  });

  // ---- Recording ----
  const recModal = document.getElementById('recModal');
  const recStartBtn = document.getElementById('recStart');
  const recStopBtn = document.getElementById('recStop');
  const recCancelBtn = document.getElementById('recCancel');
  const recRetryBtn = document.getElementById('recRetry');
  const recSaveBtn = document.getElementById('recSave');
  const recPreview = document.getElementById('recPreview');
  const recTime = document.getElementById('recTime');
  const recHint = document.getElementById('recHint');

  let mediaRecorder = null;
  let recChunks = [];
  let recTimerHandle = null;
  let recStartTime = 0;
  let recBlob = null;
  let recStream = null;

  function pickRecorderMime() {
    const candidates = [
      'audio/mp4',
      'audio/mp4;codecs=mp4a.40.2',
      'audio/webm;codecs=opus',
      'audio/webm',
      'audio/ogg;codecs=opus',
    ];
    if (!('MediaRecorder' in window)) return null;
    for (const m of candidates) {
      if (MediaRecorder.isTypeSupported(m)) return m;
    }
    return '';
  }

  function resetRecModalUi() {
    recStartBtn.style.display = '';
    recStartBtn.disabled = false;
    recStopBtn.style.display = 'none';
    recRetryBtn.style.display = 'none';
    recSaveBtn.style.display = 'none';
    recPreview.style.display = 'none';
    recPreview.removeAttribute('src');
    recTime.innerHTML = '00:00';
    recHint.textContent = '녹음 시작을 누르면 마이크 권한을 요청합니다. iOS는 녹음 중 다른 소리가 일시정지될 수 있어요.';
    recBlob = null;
  }

  function fmtTime(ms) {
    const s = Math.floor(ms / 1000);
    return `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;
  }

  function stopRecStream() {
    if (recStream) {
      recStream.getTracks().forEach(t => t.stop());
      recStream = null;
    }
  }

  document.getElementById('recordBtn').addEventListener('click', () => {
    if (!('MediaRecorder' in window) || !navigator.mediaDevices) {
      document.getElementById('status').textContent = '이 브라우저는 녹음을 지원하지 않습니다';
      return;
    }
    resetRecModalUi();
    recModal.classList.add('open');
  });

  recCancelBtn.addEventListener('click', () => {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      try { mediaRecorder.stop(); } catch {}
    }
    if (recTimerHandle) { clearInterval(recTimerHandle); recTimerHandle = null; }
    stopRecStream();
    recModal.classList.remove('open');
  });

  recStartBtn.addEventListener('click', async () => {
    recStartBtn.disabled = true;
    try {
      recStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (err) {
      recHint.textContent = '마이크 권한 거부됨: ' + err.message;
      recStartBtn.disabled = false;
      return;
    }
    const mime = pickRecorderMime();
    try {
      mediaRecorder = mime
        ? new MediaRecorder(recStream, { mimeType: mime })
        : new MediaRecorder(recStream);
    } catch (err) {
      recHint.textContent = '녹음기 생성 실패: ' + err.message;
      stopRecStream();
      recStartBtn.disabled = false;
      return;
    }
    recChunks = [];
    mediaRecorder.ondataavailable = (e) => { if (e.data && e.data.size) recChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      const type = mediaRecorder.mimeType || mime || 'audio/webm';
      recBlob = new Blob(recChunks, { type });
      const url = URL.createObjectURL(recBlob);
      recPreview.src = url;
      recPreview.style.display = 'block';
      recRetryBtn.style.display = '';
      recSaveBtn.style.display = '';
      recHint.textContent = '미리듣기 후 저장하세요.';
      stopRecStream();
    };
    recChunks = [];
    mediaRecorder.start();
    recStartTime = Date.now();
    recHint.innerHTML = '녹음 중입니다...';
    recStartBtn.style.display = 'none';
    recStopBtn.style.display = '';
    recTime.innerHTML = '<span class="rec-dot"></span>00:00';
    recTimerHandle = setInterval(() => {
      recTime.innerHTML = '<span class="rec-dot"></span>' + fmtTime(Date.now() - recStartTime);
    }, 250);
  });

  recStopBtn.addEventListener('click', () => {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      try { mediaRecorder.stop(); } catch {}
    }
    if (recTimerHandle) { clearInterval(recTimerHandle); recTimerHandle = null; }
    recStopBtn.style.display = 'none';
    recTime.innerHTML = fmtTime(Date.now() - recStartTime);
  });

  recRetryBtn.addEventListener('click', () => {
    resetRecModalUi();
  });

  recSaveBtn.addEventListener('click', async () => {
    if (!recBlob) return;
    const defaultName = '녹음 ' + new Date().toLocaleString('ko-KR', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    const name = (prompt('녹음 이름:', defaultName) || '').trim();
    if (!name) return;
    const sound = {
      id: 'custom_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
      name,
      icon: '🎤',
      blob: recBlob,
      mimeType: recBlob.type,
      loopMode: 'continuous',
      intervalSec: 30,
      createdAt: Date.now(),
    };
    try {
      await dbPut(sound);
      registerCustomSound(sound);
      document.getElementById('status').textContent = `✓ "${name}" 저장됨`;
      recModal.classList.remove('open');
    } catch (err) {
      document.getElementById('status').textContent = '저장 실패: ' + err.message;
    }
  });

  // Load custom sounds on startup
  loadCustomSounds();
</script>
</body>
</html>
